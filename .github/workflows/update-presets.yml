name: Update Presets

on:
  workflow_dispatch:
  schedule:
    # Run every day at midnight to sync any changes from the day
    - cron: "0 0 * * *"

permissions:
  contents: read
  packages: read

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Install pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8

      - name: Install Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Authenticate GitHub Package Registry
        run: echo "//npm.pkg.github.com/:_authToken=${{ secrets.GITHUB_TOKEN }}" >> ~/.npmrc

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Update presets data
        working-directory: ./apps/website
        run: pnpm build:presets

      - name: Check diff
        id: diff
        run: |
          # Check if there are any changes within the presets
          if ! git status --porcelain | grep 'apps/website/src/data/presets/'; then
            echo "No changes to commit."
            exit 0
          fi

          echo "diff=true" >> $GITHUB_OUTPUT

      - name: Create PR
        if: steps.diff.outputs.diff == 'true'
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        with:
          token: ${{ secrets.GH_PR_TOKEN }}
          sign-commits: true
          title: Update presets data
          body: |
            Generated via `pnpm build:presets` in `apps/website`.

            Check this workflow's logs at ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}.
          commit-message: Update presets data
          branch: automated/presets
