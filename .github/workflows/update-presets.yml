name: Update Presets

on:
  workflow_dispatch:
  schedule:
    # Run every day at midnight to sync any changes from the day
    - cron: "0 0 * * *"

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5.0.0

      - name: Install Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Authenticate GitHub Package Registry
        run: echo "//npm.pkg.github.com/:_authToken=${{ secrets.GITHUB_TOKEN }}" >> ~/.npmrc

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Update presets data
        working-directory: ./apps/website
        run: pnpm build:presets

      - name: Check diff
        id: diff
        run: |
          # Check if there are any changes within the presets
          if ! git status --porcelain | grep 'apps/website/src/data/presets/'; then
            echo "No changes to commit."
            exit 0
          fi

          echo "diff=true" >> $GITHUB_OUTPUT

      - name: Create PR
        if: steps.diff.outputs.diff == 'true'
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        with:
          token: ${{ secrets.GH_PR_TOKEN }}
          title: Update presets data
          body: |
            Generated via `pnpm build:presets` in `apps/website`.

            Check this workflow's logs at ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}.
          commit-message: Update presets data
          branch: automated/presets
