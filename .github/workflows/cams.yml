name: Cams
on:
  pull_request:
    paths:
      - "apps/cams/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - ".nvmrc"
      - ".github/workflows/cams.yml"
  push:
    branches:
      - "main"
      - "preview"
    paths:
      - "apps/cams/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - ".nvmrc"
      - ".github/workflows/cams.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: cams-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Verify Cams
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5.0.0

      - name: Install Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Authenticate GitHub Package Registry
        run: echo "//npm.pkg.github.com/:_authToken=${{ secrets.GITHUB_TOKEN }}" >> ~/.npmrc

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check formatting
        run: pnpm exec prettier --check .github/workflows/cams.yml apps/cams

      - name: Lint app
        run: pnpm --filter @alveusgg/cams-manager run lint

      - name: Check types
        run: pnpm --filter @alveusgg/cams-manager run types

      - name: Bundle worker
        run: pnpm --filter @alveusgg/cams-manager exec wrangler deploy --dry-run --env preview

  deploy-preview:
    name: Deploy Cams (Preview)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: verify
    if: github.repository == 'alveusgg/alveusgg' && github.event_name == 'push' && github.ref == 'refs/heads/preview'
    environment:
      name: preview
      url: https://cams-manager.preview.workers.alveussanctuary.org
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5.0.0

      - name: Install Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Authenticate GitHub Package Registry
        run: echo "//npm.pkg.github.com/:_authToken=${{ secrets.GITHUB_TOKEN }}" >> ~/.npmrc

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Deploy worker
        working-directory: apps/cams
        run: pnpm exec wrangler deploy --env preview --keep-vars

  deploy-production:
    name: Deploy Cams (Production)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: verify
    if: github.repository == 'alveusgg/alveusgg' && github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment:
      name: production
      url: https://cams-manager.workers.alveussanctuary.org
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5.0.0

      - name: Install Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Authenticate GitHub Package Registry
        run: echo "//npm.pkg.github.com/:_authToken=${{ secrets.GITHUB_TOKEN }}" >> ~/.npmrc

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Deploy worker
        working-directory: apps/cams
        run: pnpm exec wrangler deploy --env production --keep-vars
