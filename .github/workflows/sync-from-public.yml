name: Sync from Public

on:
  schedule:
    - cron: "0 * * * *" # hourly
  workflow_dispatch:

permissions: {}

jobs:
  sync:
    if: github.repository == 'alveusgg/alveusgg-private'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout private repo
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: true
          ref: ${{ github.ref }}
          token: ${{ secrets.GH_SYNC_TOKEN }}

      - name: Fetch public repo and push
        env:
          BRANCH: ${{ github.ref_name }}
        run: |
          git remote add upstream https://github.com/alveusgg/alveusgg.git
          git fetch upstream "$BRANCH"
          git push origin "upstream/$BRANCH:$BRANCH"
