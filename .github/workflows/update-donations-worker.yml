name: "Update Donations Worker"
on:
  workflow_dispatch:
  push:
    branches:
      - "main"
      - "preview"
    paths:
      - "apps/donations/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - ".github/workflows/update-donations-worker.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy (${{ (github.ref == 'refs/heads/main' && 'production') || 'preview' }})
    environment: ${{ (github.ref == 'refs/heads/main' && 'production') || 'preview' }}
    runs-on: ubuntu-latest
    if: github.repository == 'alveusgg/alveusgg'
    timeout-minutes: 10
    env:
      ALVEUS_ENVIRONMENT: ${{ (github.ref == 'refs/heads/main' && 'production') || 'preview' }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install pnpm
        uses: pnpm/action-setup@41ff72655975bd51cab0327fa583b6e92b6d3061 # v4.2.0
        with:
          run_install: false

      - name: Install Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Authenticate GitHub Package Registry
        run: echo "//npm.pkg.github.com/:_authToken=${{ secrets.GITHUB_TOKEN }}" >> ~/.npmrc

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Deploy
        working-directory: apps/donations/worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
        run: pnpm exec wrangler deploy --env=$ALVEUS_ENVIRONMENT --outdir dist --var SENTRY_DSN:$SENTRY_DSN --var SENTRY_RELEASE:${{ github.sha }} --keep-vars true

      - name: Create Sentry Release
        uses: getsentry/action-release@5657c9e888b4e2cc85f4d29143ea4131fde4a73a # v3.6.0
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: alveus-sanctuary
          SENTRY_PROJECT: donations-worker
        with:
          ignore_missing: true
          ignore_empty: true
          inject: false
          release: ${{ github.sha }}
          environment: ${{ env.ALVEUS_ENVIRONMENT }}
          sourcemaps: apps/donations/worker/dist
          strip_common_prefix: true
